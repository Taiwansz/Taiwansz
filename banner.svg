<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <style>
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 10px rgba(212,175,106,0.6)); }
    }
    @keyframes flow-signal {
      to { stroke-dashoffset: -20; }
    }
    @keyframes float-orb-1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(15px, -10px); }
    }
    @keyframes float-orb-2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-10px, 15px); }
    }
    @keyframes grid-glow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.5; }
    }
    .neuron-core {
      transform-origin: 0px 0px;
      animation: pulse-core 3s ease-in-out infinite;
    }
    .signal-line-1 {
      stroke-dasharray: 6, 6;
      animation: flow-signal 1.5s linear infinite;
    }
    .signal-line-2 {
      stroke-dasharray: 8, 8;
      animation: flow-signal 2.5s linear infinite;
    }
    .orb-1 {
      transform-origin: center;
      animation: float-orb-1 8s ease-in-out infinite;
    }
    .orb-2 {
      transform-origin: center;
      animation: float-orb-2 10s ease-in-out infinite;
    }
    .grid-bg {
      animation: grid-glow 6s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#090909" />
  
  <!-- Subtle Blueprint Grid Pattern -->
  <rect class="grid-bg" width="100%" height="100%" fill="url(#grid-pattern)" opacity="0.4" />
  
  <!-- Layout Guide Lines -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="rgba(212,175,106,0.03)" stroke-width="1" />
  <line x1="400" y1="0" x2="400" y2="240" stroke="rgba(212,175,106,0.03)" stroke-width="1" />
  
  <!-- Glowing Background Orbs -->
  <circle class="orb-1" cx="680" cy="120" r="110" fill="#D4AF6A" opacity="0.06" filter="url(#blur-effect)" />
  <circle class="orb-2" cx="120" cy="120" r="90" fill="#B8BDC7" opacity="0.03" filter="url(#blur-effect)" />

  <!-- Left Side Monogram Emblem + Text -->
  <g transform="translate(60, 120)">
    <!-- Hexagonal Frame -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#D4AF6A" stroke-width="2" />
    
    <!-- Intersecting T and Z Monogram -->
    <path d="M -13,-10 L 13,-10 L -13,12 L 13,12 M 0,-22 L 0,-10" fill="none" stroke="#F5F2EB" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Text TAIWANSZ -->
    <text x="50" y="-5" font-family="Sora, system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" letter-spacing="8" fill="#F5F2EB">
      TAIWAN<tspan fill="#D4AF6A">SZ</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="50" y="22" font-family="Manrope, system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="3.5" fill="#B8BDC7" opacity="0.75">
      AI ENGINEERING &amp; SYSTEMS ARCHITECT
    </text>
  </g>
  
  <!-- Right Side: Animated Neural Network / Systems Graph -->
  <g transform="translate(660, 120)">
    <!-- Connection Lines (Synapses) -->
    <line x1="-60" y1="-40" x2="0" y2="0" stroke="rgba(212,175,106,0.3)" stroke-width="1.5" />
    <line x1="-60" y1="40" x2="0" y2="0" stroke="rgba(184,189,199,0.25)" stroke-width="1.5" />
    <line x1="0" y1="0" x2="60" y2="-30" stroke="rgba(212,175,106,0.3)" stroke-width="1.5" />
    <line x1="0" y1="0" x2="60" y2="30" stroke="rgba(184,189,199,0.25)" stroke-width="1.5" />
    
    <!-- Flowing Signals (Animated Dashed Lines on top) -->
    <line class="signal-line-1" x1="-60" y1="-40" x2="0" y2="0" stroke="#D4AF6A" stroke-width="2" stroke-linecap="round" />
    <line class="signal-line-2" x1="-60" y1="40" x2="0" y2="0" stroke="#B8BDC7" stroke-width="2" stroke-linecap="round" />
    <line class="signal-line-2" x1="0" y1="0" x2="60" y2="-30" stroke="#B8BDC7" stroke-width="2" stroke-linecap="round" />
    <line class="signal-line-1" x1="0" y1="0" x2="60" y2="30" stroke="#D4AF6A" stroke-width="2" stroke-linecap="round" />
    
    <!-- Secondary Outer Connections -->
    <line x1="-60" y1="-40" x2="-60" y2="40" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="60" y1="-30" x2="60" y2="30" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="-60" y1="-40" x2="60" y2="-30" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    <line x1="-60" y1="40" x2="60" y2="30" stroke="rgba(255,255,255,0.04)" stroke-width="1" />

    <!-- Node A (Input 1) -->
    <circle cx="-60" cy="-40" r="5" fill="#D4AF6A" stroke="#090909" stroke-width="1.5" />
    
    <!-- Node B (Input 2) -->
    <circle cx="-60" cy="40" r="5" fill="#B8BDC7" stroke="#090909" stroke-width="1.5" />
    
    <!-- Node D (Output 1) -->
    <circle cx="60" cy="-30" r="5" fill="#B8BDC7" stroke="#090909" stroke-width="1.5" />
    
    <!-- Node E (Output 2) -->
    <circle cx="60" cy="30" r="5" fill="#D4AF6A" stroke="#090909" stroke-width="1.5" />

    <!-- Central Neural Core (Pulsing) -->
    <g class="neuron-core">
      <circle cx="0" cy="0" r="9" fill="url(#goldGradient)" stroke="#F5F2EB" stroke-width="1" />
      <circle cx="0" cy="0" r="4" fill="#090909" />
    </g>
  </g>
  
  <!-- Definitions -->
  <defs>
    <!-- Blueprint Grid definition -->
    <pattern id="grid-pattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.012)" stroke-width="1" />
    </pattern>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF6A" />
      <stop offset="100%" stop-color="#B8893C" />
    </linearGradient>
    
    <filter id="blur-effect">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>
</svg>
