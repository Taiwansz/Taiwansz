<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <style>
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .pixel-heart {
      transform-origin: 0px 0px;
      animation: heartbeat 1.4s infinite ease-in-out;
    }
    .cursor {
      animation: blink 1s infinite;
    }
  </style>

  <!-- Window Frame -->
  <rect width="100%" height="100%" fill="#090909" rx="8" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <!-- Title Bar -->
  <path d="M 0,35 L 0,8 A 8,8 0 0,1 8,0 L 792,0 A 8,8 0 0,1 800,8 L 800,35 Z" fill="#16161a" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <circle cx="20" cy="17.5" r="5" fill="#ff5f56" />
  <circle cx="36" cy="17.5" r="5" fill="#ffbd2e" />
  <circle cx="52" cy="17.5" r="5" fill="#27c93f" />
  <text x="400" y="22" font-family="monospace" font-size="11" fill="#b8bdc7" text-anchor="middle">
    taiwansz@terminal: ~ (python3)
  </text>
  
  <!-- Python Code Window -->
  <g font-family="monospace" font-size="14" fill="#F5F2EB" xml:space="preserve">
    <text x="40" y="70"><tspan fill="#D4AF6A">import</tspan> developer</text>
    <text x="40" y="90"><tspan fill="#D4AF6A">import</tspan> coffee</text>
    <text x="40" y="120"><tspan fill="#D4AF6A">try</tspan>:</text>
    <text x="40" y="140">    <tspan fill="#D4AF6A">while</tspan> alive:</text>
    <text x="40" y="160">        developer.code()</text>
    <text x="40" y="180">        coffee.drink()</text>
    <text x="40" y="200"><tspan fill="#D4AF6A">except</tspan> CoffeeError:</text>
    <text x="40" y="220">    <tspan fill="#696969"># TODO: insert coin for more coffee</tspan></text>
    <text x="320" y="220" class="cursor" fill="#D4AF6A">█</text>
  </g>

  <!-- Right Side: Pulsing Pixel Art Heart (Gold and Silver) -->
  <g class="pixel-heart" transform="translate(640, 130)">
    <!-- Row -4 -->
    <rect x="-16" y="-20" width="8" height="4" fill="#D4AF6A" />
    <rect x="8" y="-20" width="8" height="4" fill="#D4AF6A" />
    
    <!-- Row -3 -->
    <rect x="-20" y="-16" width="16" height="4" fill="#D4AF6A" />
    <rect x="4" y="-16" width="16" height="4" fill="#D4AF6A" />
    
    <!-- Row -2 -->
    <rect x="-24" y="-12" width="48" height="4" fill="#D4AF6A" />
    
    <!-- Row -1 -->
    <rect x="-24" y="-8" width="48" height="4" fill="#F5F2EB" />
    
    <!-- Row 0 -->
    <rect x="-24" y="-4" width="48" height="4" fill="#F5F2EB" />
    
    <!-- Row 1 -->
    <rect x="-20" y="0" width="40" height="4" fill="#D4AF6A" />
    
    <!-- Row 2 -->
    <rect x="-16" y="4" width="32" height="4" fill="#D4AF6A" />
    
    <!-- Row 3 -->
    <rect x="-12" y="8" width="24" height="4" fill="#D4AF6A" />
    
    <!-- Row 4 -->
    <rect x="-8" y="12" width="16" height="4" fill="#B8893C" />
    
    <!-- Row 5 -->
    <rect x="-4" y="16" width="8" height="4" fill="#B8893C" />
  </g>
</svg>
